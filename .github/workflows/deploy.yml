name: Deploy Docker SPA to AWS

on:
  push:
    branches:
      - main  # main 브랜치에 코드가 push될 때 트리거

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. 멀티 플랫폼 빌드 환경 설정 (AMD64, ARM64 지원)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 2. 도커 허브 로그인 (보안을 위해 Access Token 사용 권장)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. FastAPI 이미지 빌드 및 푸시
      - name: Build and Push FastAPI
        uses: docker/build-push-action@v4
        with:
          context: ./fastapi
          platforms: linux/amd64,linux/arm64
          push: true
          # soyoung0/fastapi:docker-spa 형태로 저장됩니다.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fastapi:docker-spa

      # 4. Nginx 이미지 빌드 및 푸시
      - name: Build and Push Nginx
        uses: docker/build-push-action@v4
        with:
          context: ./nginx
          platforms: linux/amd64,linux/arm64
          push: true
          # soyoung0/nginx:docker-spa 형태로 저장됩니다.
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/nginx:docker-spa

  deploy-to-aws:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      # 5. SSH를 통해 AWS EC2 접속 및 최신 컨테이너 배포
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ec2-user  # Amazon Linux 기준
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            docker rm -f fastapi-docker-spa nginx-docker-spa 2>/dev/null
            
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/fastapi:docker-spa
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/nginx:docker-spa
            
            docker network create docker-network || true
            
            docker run -d --name fastapi-docker-spa \
              --network docker-network \
              --restart unless-stopped \
              -p 8000:8000 \
              ${{ secrets.DOCKERHUB_USERNAME }}/fastapi:docker-spa
            
            docker run -d --name nginx-docker-spa \
              --network docker-network \
              --restart unless-stopped \
              -p 80:80 \
              ${{ secrets.DOCKERHUB_USERNAME }}/nginx:docker-spa